name: doener_empire
description: Döner Empire - Baue dein Döner-Imperium auf
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.4

  # Lokale Datenspeicherung
  shared_preferences: ^2.2.3

  # Zahlenformatierung
  intl: ^0.19.0

  # Eindeutige IDs
  uuid: ^4.4.0

  # Charts für Finanzen
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
